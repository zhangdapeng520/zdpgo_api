syntax = "proto3";

option java_multiple_files = true;
option java_package = "io.grpc.examples.helloworld";
option java_outer_classname = "HelloWorldProto";

package helloworld;

// 服务名
service Greeter {
  // 发送消息
  rpc SayHello (HelloRequest) returns (HelloReply) {}
}

// 发送消息请求
message HelloRequest {
  string name = 1;
}

// 发送消息响应
message HelloReply {
  string message = 1;
}
