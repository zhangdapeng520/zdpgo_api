<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    var ws = new WebSocket("ws://localhost:2303/ping");
    //连接打开时触发
    ws.onopen = function(evt) {
        console.log("建立websocket连接成功 ...");
        ws.send("你好，这是来自客户端的消息。"); // 第一条消息
        ws.send("ping"); // 第二条消息
    };
    //接收到消息时触发
    ws.onmessage = function(evt) {
        console.log("接收到来自服务器的消息: " + evt.data);
    };
    //连接关闭时触发
    ws.onclose = function(evt) {
        console.log("连接关闭。");
    };

</script>

</body>
</html>
